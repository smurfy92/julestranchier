<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <!-- Browser chrome -->
  <rect x="40" y="30" width="720" height="340" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="70" cy="50" r="6" fill="#ef4444"/>
  <circle cx="90" cy="50" r="6" fill="#eab308"/>
  <circle cx="110" cy="50" r="6" fill="#22c55e"/>
  <rect x="200" y="42" width="400" height="16" rx="8" fill="#0f172a"/>
  <!-- Header -->
  <rect x="60" y="75" width="100" height="14" rx="4" fill="#4f46e5"/>
  <rect x="580" y="78" width="24" height="10" rx="2" fill="#334155"/>
  <rect x="620" y="78" width="24" height="10" rx="2" fill="#334155"/>
  <rect x="660" y="75" width="80" height="16" rx="8" fill="#4f46e5"/>
  <!-- Product grid -->
  <rect x="60" y="105" width="220" height="160" rx="8" fill="#0f172a"/>
  <rect x="60" y="105" width="220" height="110" rx="8" fill="#334155"/>
  <rect x="75" y="225" width="120" height="10" rx="4" fill="#e2e8f0"/>
  <rect x="75" y="243" width="60" height="10" rx="4" fill="#4f46e5"/>
  <rect x="290" y="105" width="220" height="160" rx="8" fill="#0f172a"/>
  <rect x="290" y="105" width="220" height="110" rx="8" fill="#334155"/>
  <rect x="305" y="225" width="120" height="10" rx="4" fill="#e2e8f0"/>
  <rect x="305" y="243" width="60" height="10" rx="4" fill="#22c55e"/>
  <!-- Cart sidebar -->
  <rect x="530" y="105" width="210" height="250" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="550" y="120" width="80" height="12" rx="4" fill="#e2e8f0"/>
  <!-- Cart items -->
  <rect x="550" y="148" width="40" height="40" rx="6" fill="#334155"/>
  <rect x="600" y="152" width="100" height="8" rx="4" fill="#94a3b8"/>
  <rect x="600" y="168" width="50" height="8" rx="4" fill="#64748b"/>
  <rect x="550" y="200" width="40" height="40" rx="6" fill="#334155"/>
  <rect x="600" y="204" width="100" height="8" rx="4" fill="#94a3b8"/>
  <rect x="600" y="220" width="50" height="8" rx="4" fill="#64748b"/>
  <!-- Divider -->
  <line x1="550" y1="260" x2="720" y2="260" stroke="#334155" stroke-width="1"/>
  <!-- Total -->
  <rect x="550" y="275" width="40" height="10" rx="4" fill="#94a3b8"/>
  <rect x="670" y="275" width="50" height="10" rx="4" fill="#e2e8f0"/>
  <!-- Checkout button -->
  <rect x="550" y="305" width="170" height="36" rx="8" fill="#4f46e5"/>
  <rect x="590" y="318" width="90" height="10" rx="4" fill="#ffffff"/>
  <!-- Sale badge -->
  <rect x="65" y="112" width="50" height="20" rx="4" fill="#ef4444"/>
  <rect x="73" y="118" width="34" height="8" rx="3" fill="#ffffff"/>
</svg>
