<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="12" fill="#0f172a"/>
  <!-- Phone frame -->
  <rect x="290" y="20" width="220" height="360" rx="24" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="302" y="50" width="196" height="300" rx="4" fill="#0f172a"/>
  <!-- Status bar -->
  <rect x="360" y="28" width="80" height="6" rx="3" fill="#334155"/>
  <!-- Map area -->
  <rect x="302" y="50" width="196" height="160" fill="#1a2332"/>
  <!-- Map elements -->
  <circle cx="370" cy="120" r="8" fill="#4f46e5" opacity="0.8"/>
  <circle cx="370" cy="120" r="16" fill="#4f46e5" opacity="0.2"/>
  <circle cx="430" cy="100" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="430" cy="100" r="12" fill="#ef4444" opacity="0.2"/>
  <circle cx="460" cy="150" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="460" cy="150" r="14" fill="#22c55e" opacity="0.2"/>
  <!-- Map lines (roads) -->
  <line x1="302" y1="90" x2="498" y2="90" stroke="#334155" stroke-width="1"/>
  <line x1="302" y1="140" x2="498" y2="140" stroke="#334155" stroke-width="1"/>
  <line x1="380" y1="50" x2="380" y2="210" stroke="#334155" stroke-width="1"/>
  <line x1="440" y1="50" x2="440" y2="210" stroke="#334155" stroke-width="1"/>
  <!-- Bottom card -->
  <rect x="312" y="220" width="176" height="60" rx="12" fill="#1e293b"/>
  <rect x="328" y="232" width="80" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="328" y="250" width="120" height="8" rx="4" fill="#64748b"/>
  <rect x="328" y="264" width="60" height="8" rx="4" fill="#4f46e5"/>
  <!-- Bottom nav -->
  <rect x="312" y="295" width="176" height="44" rx="8" fill="#1e293b"/>
  <circle cx="345" cy="317" r="10" fill="#334155"/>
  <circle cx="390" cy="317" r="10" fill="#4f46e5"/>
  <circle cx="435" cy="317" r="10" fill="#334155"/>
  <circle cx="475" cy="317" r="10" fill="#334155"/>
  <!-- Notification badge -->
  <circle cx="435" cy="310" r="5" fill="#ef4444"/>
  <!-- Home indicator -->
  <rect x="360" y="358" width="80" height="4" rx="2" fill="#334155"/>
</svg>
